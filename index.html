<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSE Quiz Master</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- PARTICLES -->
<div class="particles">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- HOME -->
<div id="home-screen" class="screen active">

  <div class="home-bg-orb orb1"></div>
  <div class="home-bg-orb orb2"></div>

  <div class="home-wrapper">

    <div class="home-badge">
      <i class="fa-solid fa-code"></i>
      CSE QUIZ MASTER
    </div>

    <h3 class="home-title">
      Think Fast.  <br/>
      Code Smart.<br/>
    </h3>

    <img
      src="screenshorts/quiz.jfif"
      class="hero-image"
      alt="Quiz"
    />

    <p class="home-sub">
      80+ questions across DSA, OS, Networks,
      DBMS, OOP & more. 10 random questions every round!
    </p>

    <div class="home-stats">

      <div class="stat-pill">
        <i class="fa-solid fa-clock"></i>
        15s per question
      </div>

      <div class="stat-pill">
        <i class="fa-solid fa-shuffle"></i>
        Random each round
      </div>

      <div class="stat-pill">
        <i class="fa-solid fa-laptop-code"></i>
        8 CSE topics
      </div>

    </div>

    <div class="theme-row">

      <span class="theme-label">Theme</span>

      <button class="theme-btn active" id="btn-light"
        onclick="setTheme('light')">
        ☀ Light
      </button>

      <button class="theme-btn" id="btn-dark"
        onclick="setTheme('dark')">
        🌙 Dark
      </button>

    </div>

    <button class="cta-btn" onclick="startQuiz()">
      Start Quiz →
    </button>

  </div>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">

  <div class="quiz-topbar">

    <div class="q-label" id="q-label">
      Question 1
    </div>

    <div class="timer-wrap">

      <svg class="timer-ring" viewBox="0 0 44 44">

        <circle
          cx="22"
          cy="22"
          r="18"
          fill="none"
          stroke="#e5e7eb"
          stroke-width="4"
        />

        <circle
          id="timer-arc"
          cx="22"
          cy="22"
          r="18"
          fill="none"
          stroke="#7c3aed"
          stroke-width="4"
          stroke-dasharray="113"
          stroke-dashoffset="0"
          stroke-linecap="round"
          transform="rotate(-90 22 22)"
        />

      </svg>

      <span id="timer-text" class="timer-text">15</span>

    </div>

    <div class="score-badge">
      Score:
      <span id="live-score">0</span>
    </div>

  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="quiz-body">

    <div class="category-tag" id="category-tag">
      DSA
    </div>

    <p class="question-text" id="question-text">
      Loading...
    </p>

    <div class="options-grid" id="options-grid"></div>

    <button class="next-btn" id="next-btn"
      onclick="nextQuestion()" disabled>
      Next →
    </button>

  </div>

</div>

<!-- RESULT -->
<div id="result-screen" class="screen">

  <div class="result-wrapper">

    <div class="result-emoji" id="result-emoji">
      🏆
    </div>

    <h2 class="result-heading" id="result-heading">
      Brilliant!
    </h2>

    <p class="result-sub" id="result-sub">
      You scored 8/10
    </p>

    <div class="score-circle">

      <svg viewBox="0 0 120 120"
        class="score-ring-svg">

        <circle
          cx="60"
          cy="60"
          r="50"
          fill="none"
          stroke="#e5e7eb"
          stroke-width="10"
        />

        <circle
          id="score-arc"
          cx="60"
          cy="60"
          r="50"
          fill="none"
          stroke="#7c3aed"
          stroke-width="10"
          stroke-dasharray="314"
          stroke-dashoffset="314"
          stroke-linecap="round"
          transform="rotate(-90 60 60)"
        />

      </svg>

      <div class="score-center">

        <span class="score-big" id="score-big">
          0
        </span>

        <span class="score-max">
          /10
        </span>

      </div>

    </div>

    <div class="result-breakdown"
      id="result-breakdown"></div>

    <div class="result-actions">

      <button class="cta-btn"
        onclick="restartQuiz()">
        ↻ Play Again
      </button>

      <button class="outline-btn"
        onclick="goHome()">
        ← Home
      </button>

    </div>

  </div>

</div>

<!-- AUDIO -->
<audio id="correct-sound"
src="assets/sounds/correct.mp3"></audio>

<audio id="wrong-sound"
src="assets/sounds/wrong.mp3"></audio>

<audio id="click-sound"
src="assets/sounds/click.mp3"></audio>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>
</html>
